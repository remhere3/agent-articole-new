services:
  app:
    build: .
    container_name: agent-articole
    restart: unless-stopped
    ports:
      - "8007:8007"
    volumes:
      - ./agent_articole.db:/app/agent_articole.db
    env_file: .env
    depends_on:
      - ntfy
    environment:
      - DATABASE_URL=sqlite:///./agent_articole.db

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "8080:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-etc:/etc/ntfy
    environment:
      - NTFY_BASE_URL=http://localhost:8080
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db

volumes:
  ntfy-cache:
  ntfy-etc:
